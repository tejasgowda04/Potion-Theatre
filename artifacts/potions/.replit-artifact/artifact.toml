kind = "web"
previewPath = "/"
title = "Potions Cocktail Theatre"
version = "1.0.0"
id = "artifacts/potions"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21347

[services.development]
run = "pnpm --filter @workspace/potions run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/potions", "run", "build" ]
publicDir = "artifacts/potions/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21347"
BASE_PATH = "/"
